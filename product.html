<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<style>

body {
  display: flex;
  justify-content: center;  /* horizontal */
  align-items: center;      /* vertical */
  min-height: 100vh;
}

* {
  box-sizing: border-box;
}

.product-container {
  display: flex;
  max-width: 1100px;
  width: 100%;
  height: 80vh;   /* KEY: shared height */
}


/* IMAGE */
.image-container,
.card {
  height: 100%;
}

.image-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f5f5f5;
}

.image-container img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* CARD */
.card {
  flex: 1;
  background: white;
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);

  display: grid;

  grid-template-rows: auto auto auto auto auto auto;
  row-gap: 16px;
}

/* TEXT STYLING */
.card h1 {
  margin: 0;
  font-size: 26px;
  font-weight: 600;
}

.price {
  margin: 0;
  font-size: 22px;
  color: #2e7d32;
  font-weight: bold;
}

.description {
  margin: 0;
}

/* DIVIDER LINE */
.divider {
  height: 1px;
  background: #c1c1c1;
  /* margin: 16px 0; */
}

.btn-container {
  width: 100%;
  display: flex;
  justify-content: center;  /* THIS is the key */
  align-items: center;
}

/* BUTTON */
.buy-btn {

  width: 15ch;
  height: 48px;
  padding: 10px 20px 10px 20px;
  border: none;
  border-radius: 10px;
  background: #2e7d32;
  color: white;
  font-size: 1.5rem;
  cursor: pointer;
  transition: all 0.2s ease;
  box-sizing: border-box;
}

/* "Added to cart" state */
.buy-btn.added {
  background: #4caf50;
  transform: none; /* prevents visual jump */
  line-height: 0.8;
}

.buy-btn:hover {
  background: #256628;
}


/* DESKTOP */
@media (min-width: 768px) {
  .product-container {
    flex-direction: row;
    align-items: center;
    justify-content: center;
    /* padding: 20px; */
  }

  .image-container {
    width: 50%;
    height: 80vh;
    border-radius: 20px;
  }

  .card {
    width: 400px;
    margin: 0 0 0 40px;
  }
}


.quantity-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  /* margin-top: 20px; */
}

.qty-btn {
  width: 40px;
  height: 40px;
  border: none;
  background: #f0f0f0;
  border-radius: 10px;
  font-size: 20px;
  cursor: pointer;
  transition: 0.2s;
}

.qty-btn:hover {
  background: #e0e0e0;
}

#quantity {
  font-size: 18px;
  font-weight: bold;
  min-width: 20px;
  text-align: center;
}


</style>

<body>

  <div class="product-container">

    <div class="image-container">
      <img id="product-image" />
    </div>

    <div class="card">
      <h1 id="product-name"></h1>

      <p id="product-price" class="price"></p>

      
      <p id="product-description" class="description"></p>
      
      <div class="divider"></div>

      <div class="quantity-container">
        <button class="qty-btn" id="decrease">−</button>
        <span id="quantity">1</span>
        <button class="qty-btn" id="increase">+</button>
      </div>

      <div class="btn-container">
        <button class="buy-btn" id="buy-btn">Add to Cart</button>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>


</body>
</html>
